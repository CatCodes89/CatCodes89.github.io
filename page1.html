<!doctype html>
<html lang="en">
<head>

</head>
<body>

<div id="spinner-container">
    <div id="spinner"></div>
    <span id="spinner-text">Click to Begin</span>
</div>

<div id="question-container" style="display: none;">
    <input type="text" id="question-input" placeholder="Ask a yes/no question..." />
    <button id="shake-button">Shake the 8-Ball</button>
    <p id="answer-text"></p>
</div>

<h1>Ask the Magic 8-Ball...</h1>
