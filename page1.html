<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic 8-Ball Game</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>

<div id="spinner-container">
    <div id="rotating-spinner" aria-hidden="true">
        <div id="spinner"></div>
    </div>
    <span id="spinner-text" role="button" aria-label="Click to begin the game">Click to Begin</span>
    <!-- These elements will be centered inside the spinner -->
    <div id="question-container" style="display: none;">
        <input type="text" id="question-input" placeholder="Ask a yes/no question..." aria-label="Enter your question here" />
        <button id="shake-button" aria-label="Shake the 8-Ball" role="button">Shake the 8-Ball</button>
        <p id="answer-text" role="alert" aria-live="assertive"></p>
    </div>
</div>

<h1>Ask the Magic 8-Ball...</h1>
<p><a href="index.html" aria-label="Go back to the main page">Click here to go back to the main page</a></p>

<script src="scripts.js"></script> <!-- External JavaScript file -->
</body>
</html>
