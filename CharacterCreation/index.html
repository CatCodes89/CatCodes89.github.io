<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy RPG Character Creator</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Character Section (Preview + Buttons) -->
        <div class="character-section">
            <div class="preview">
                <img id="characterBase" src="assets/skin1.svg" alt="Character Base">
                <img id="characterEyes" src="assets/eyes1.svg" alt="Character Eyes">
                <img id="characterHair" src="assets/hair1.svg" alt="Character Hair">
                <img id="characterClothes" src="assets/clothes1.svg" alt="Character Clothes">
            </div>

            <div class="actions">
                <button id="randomize">
                    <img src="assets/randomize.svg" alt="Randomize">
                    <span class="button-text">Randomize</span>
                </button>
                <button id="save">
                    <img src="assets/save.svg" alt="Save Character">
                    <span class="button-text">Save</span>
                </button>
            </div>
        </div>

        <!-- Controls Panel -->
        <div class="controls">
            <div class="customize-border">
                <img src="assets/banner.svg" alt="Border">
            </div>

            <h2 class="title">Customize Your Character</h2>

            <!-- Skin Color Thumbnails -->
            <div class="option">
                <div class="thumbnail-container">
                    <img src="assets/skin1.svg" class="thumbnail" id="skin1" alt="Skin 1">
                    <img src="assets/skin2.svg" class="thumbnail" id="skin2" alt="Skin 2">
                    <img src="assets/skin3.svg" class="thumbnail" id="skin3" alt="Skin 3">
                </div>
            </div>

            <!-- Eye Color Thumbnails -->
            <div class="option">
                <div class="thumbnail-container">
                    <img src="assets/eyes1.svg" class="thumbnail" id="eyes1" alt="Eyes 1">
                    <img src="assets/eyes2.svg" class="thumbnail" id="eyes2" alt="Eyes 2">
                    <img src="assets/eyes3.svg" class="thumbnail" id="eyes3" alt="Eyes 3">
                </div>
            </div>

            <!-- Hair Thumbnails -->
            <div class="option">
                <div class="thumbnail-container">
                    <img src="assets/hair1.svg" class="thumbnail" id="hair1" alt="Hair 1">
                    <img src="assets/hair2.svg" class="thumbnail" id="hair2" alt="Hair 2">
                </div>
            </div>

            <!-- Clothes Thumbnails -->
            <div class="option">
                <div class="thumbnail-container">
                    <img src="assets/clothes1.svg" class="thumbnail" id="clothes1" alt="Clothes 1">
                    <img src="assets/clothes2.svg" class="thumbnail" id="clothes2" alt="Clothes 2">
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
